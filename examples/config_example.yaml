# =============================================================================
# mukun_md_push 样式配置示例
# 放置到 ~/.md_push_wechat/config.yaml 或通过 --config 指定
# =============================================================================

wechat:
  appid: your_appid       # 公众号 AppID（推送草稿箱必填）
  secret: your_secret     # 公众号 AppSecret（推送草稿箱必填）

# ─── 样式配置 ─────────────────────────────────────────────────────────────────
style:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  新闻模式（news）：板块化内容，报纸风格配色                            ║
  # ║  用法：python3 scripts/md2news_html.py <input.md>                      ║
  # ║  适用：AI 周报、行业动态汇总等分板块的日报类内容                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  news:
    # ── 配色 ──
    bg: "#f5f0e1"                 # 页面背景色（米黄报纸底色）
    card: "#faf7f0"               # 卡片/板块底色
    dark: "#3c2415"               # 深色文字（正文加粗）
    heading: "#3c2415"            # 标题颜色
    accent: "#b8860b"             # 强调色（板块名称标签）
    rule: "#c9b99a"               # 分隔线颜色
    muted: "#a08c6a"              # 次要文字（来源、作者）
    caption: "#a89880"            # 脚注文字（底部报尾）
    hero_bg: "#2c1810"            # 封面标题区底色
    table_bg: "#f0ead8"           # 表头底色

    # ── 字号 ──
    title_font_size: "22px"       # 文章主标题
    text_font_size: "15px"        # 正文文字
    h2_font_size: "18px"          # H2 板块标题
    card_font_size: "15px"        # 卡片/板块内文字
    cover_label: "AI WEEKLY REVIEW"   # 封面副标题

    # ── 板块颜色映射（板块名: 颜色值）──
    section_colors:
      行业动态: "#b8860b"
      AI 工具与智能体更新: "#556b2f"
      AI 工具: "#556b2f"
      模型发布与更新: "#4a3728"
      模型发布: "#4a3728"
      重要研究进展: "#2f4f4f"
      研究进展: "#2f4f4f"
      今日要点总结: "#3c2415"
      本周要点总结: "#3c2415"

    # ── 总结表格类别颜色（表格中的类别标签: 颜色值）──
    summary_colors:
      行业: "#b8860b"
      工具: "#556b2f"
      模型: "#4a3728"
      研究: "#2f4f4f"

    # ── 触发总结表格渲染的板块关键词 ──
    summary_sections:
      - 总结

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  文章模式（article）：长文叙事，统一渲染，配色可配置                    ║
  # ║  用法：python3 scripts/md2article_html.py <input.md>                   ║
  # ║        python3 scripts/md2article_html.py --config <cfg> <input.md>    ║
  # ║  适用：技术实践、成语典故、历史故事等长文                              ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  article:
    # ── 配色 ──
    bg: "#ffffff"                 # 页面背景色（白色）
    text: "rgb(85,85,85)"         # 正文文字颜色
    accent: "rgb(198,110,73)"     # 强调色（封面底色，默认棕色系）
    hero_bg: "rgb(198,110,73)"    # 封面标题区底色
    hero_title_color: "#ffffff"   # 封面标题文字颜色
    bold: "rgb(51,51,51)"         # 加粗文字颜色
    rule: "#ddd"                  # 分隔线颜色
    caption: "#888"               # 脚注/次要文字颜色

    # ── 字号 ──
    title_font_size: "22px"       # 文章主标题
    text_font_size: "16px"        # 正文文字
    h2_font_size: "18px"          # H2 标题
    cover_label: "AI 实践观察"    # 封面副标题

    # ── 文末 ──
    # footer: 底部署名（空字符串不显示），用于替换 ending_lines
    footer: ""

    # ending_lines: 文末尾栏，每项一个 <p> 段落。设为 [] 不显示尾栏
    # 支持内嵌 HTML 标签（如 <span> 设置颜色）
    ending_lines:
      - "—End—"
      - '如果觉得不错 随手点个 <span style="color:#ff4c41">赞</span>、<span style="color:#ff2941">在看</span>、<span style="color:#ff4c41">转发</span> 三连吧'
      - '<span style="color:#ff2941">关注+星标</span> 可第一时间收到更多精彩思考和总结'
      - "您的支持是我继续写下去的动力"
      - "注：原创不易，合作请在公众号后台留言，未经许可，不得随意修改及盗用原文"


# ═══════════════════════════════════════════════════════════════════════════════
# 配色方案示例
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. 泛黄怀旧（历史文章）
#    → 见 examples/nostalgic/config_nostalgic.yaml
#    特点：古卷泛黄底色 + 古铜暖棕强调色
#
# 2. 科技蓝紫（AI 科技文章）
#    → 见 examples/modern/config_modern.yaml
#    特点：冷色调蓝紫 + 深色封面
#
# 自定义配色只需：
#   1. 复制上方 style.article 节点
#   2. 修改 bg / accent / hero_bg 等颜色值
#   3. 传入 --config 参数
